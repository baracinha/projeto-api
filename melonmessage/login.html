<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Login - Casino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <div class="main-content">
    <a href="login.html" class="logo">CASARÃO</a>
    <div class="login-side">
      <div class="login-container">
        <h1>Iniciar Sessão</h1>
        <form action="login.html" id="loginform" method="post">
          <input type="name" name="name" id="name" placeholder="Name" required>
          <input type="password" name="password" id="password" placeholder="Senha" required>
          <button type="submit">Entrar</button>
        </form>
        <div class="link">
          <p><a href="#">Esqueceu a senha?</a></p>
          <p><a href="registro.html">Criar nova conta</a></p>
        </div>
      </div>
    </div>
    <div class="image-side" style="background-image: url('img/CASA.jpg')"></div>
  </div>
 <script type="module" src="js/script.js"></script>
</body>
</html>
