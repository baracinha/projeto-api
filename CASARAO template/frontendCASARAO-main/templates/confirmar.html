<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Confirmar - CASARÃO</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>


  <div class="main-content">
    <a href="login.html" class="logo">CASARÃO</a>
    <div class="login-side">
      <div class="login-container">
        <h1>Confirmar Email</h1>
        <form action="login.html" method="post">
          <input type="password" name="password" id="password" placeholder="Nova Password" required>
          <div class="code-wrapper">
            <label>Código de Confirmação</label>
            
            <div class="code-container">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
            </div>
           </div>
          <button type="submit">Seguinte</button>
        </form>
        <div class="link">
          <p><a href="login.html">Ir para o login</a></p>
        </div>
      </div>
    </div>
    <div class="image-side" style="background-image: url('img/CASA.jpg')"></div>
  </div>

</body>
</html>
